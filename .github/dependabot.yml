# Keep dependencies and GitHub Actions current; surface vulnerable updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Gradle dependencies and plugins (build.gradle.kts).
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "ci"

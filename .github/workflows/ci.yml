name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      # Guardrail: README install snippets must show the project version declared
      # in build.gradle.kts. The release workflow auto-PRs an update on every
      # `release: published`, but if for any reason that PR is missed (or someone
      # edits build.gradle.kts manually), this step fails the build instead of
      # silently shipping stale install instructions. Fix in one shot with:
      #   scripts/sync-readme-version.sh <version>
      - name: Check README install version is in sync
        run: |
          VERSION="$(sed -nE 's/^version = .*\"([^"]+)\".*$/\1/p' build.gradle.kts | head -1)"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from build.gradle.kts" >&2
            exit 1
          fi
          echo "Project version: $VERSION"
          bash scripts/sync-readme-version.sh --check "$VERSION"

      - name: Build, test and run Detekt
        run: ./gradlew build --stacktrace

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-report
          path: build/reports/tests
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: build/reports/kover/report.xml
          if-no-files-found: ignore

name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          languages: java-kotlin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # Manual build (more reliable than autobuild for Kotlin): compile the JVM main + test
      # sources so CodeQL can extract them. (Multiplatform: there is no `classes` lifecycle
      # task; use the JVM-target Kotlin compile tasks.)
      - name: Compile
        run: ./gradlew compileKotlinJvm compileTestKotlinJvm --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3.36.1
        with:
          category: "/language:java-kotlin"

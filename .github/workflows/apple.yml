name: Apple & Native (macOS)

# Verifies the Apple (macOS/iOS) and cross-compiled Native targets on a macOS host —
# the same host the Release workflow publishes from. The required "Build, test & lint"
# gate runs on Linux (fast: jvm/js/wasm/linux/mingw); this complements it by exercising
# the targets that can only be built on macOS, so Apple breakage is caught on the PR
# rather than at release time. (linuxX64 in the Linux gate already exercises the same
# Kotlin/Native regex engine the Apple targets use.)

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apple:
    name: Build & test Apple/Native
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # Run the Apple tests that can execute on the runner (macOS host + iOS simulator),
      # then `publishToMavenLocal` to prove EVERY target (Apple, iOS, linuxX64, mingwX64,
      # jvm, js, wasm) builds on this host — exactly what the Release workflow does, minus
      # the remote upload. We don't run linuxX64Test/mingwX64Test here: those binaries
      # build on macOS but cannot be executed on it.
      - name: Test Apple + verify all targets build
        run: ./gradlew macosArm64Test iosSimulatorArm64Test publishToMavenLocal

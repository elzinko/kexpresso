name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without the leading v), e.g. 0.1.0"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, publish & release
    # macOS is the most capable Kotlin/Native host — it can build EVERY target
    # (Apple, iOS, Linux, Windows, JVM, JS, Wasm). Publishing from a single all-targets
    # host produces complete, consistent multiplatform metadata, so consumers resolving
    # the root module see every variant (incl. macOS/iOS). Slower than Linux, but releases
    # are infrequent and macOS runners are free for public repos.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0

      # Sanity-check on the release host (safe on macOS — pure JVM). The full
      # cross-platform test matrix already ran in CI (ci.yml on Linux + apple.yml on macOS);
      # we must NOT run `build`/`allTests` here because linuxX64Test/mingwX64Test cannot
      # EXECUTE on a macOS host (you can build those binaries, but not run them).
      - name: Sanity test (JVM)
        run: ./gradlew -PreleaseVersion=${{ steps.version.outputs.value }} jvmTest

      - name: Publish to GitHub Packages
        # `publishAllPublicationsToGitHubPackagesRepository` builds every target's artifacts
        # (incl. Apple/iOS klibs) and the complete root metadata, then uploads them to GitHub
        # Packages only — WITHOUT triggering the Maven Central / signing tasks (the plain
        # `publish` task would now also target the Central repo). No cross-platform tests run.
        run: >-
          ./gradlew -PreleaseVersion=${{ steps.version.outputs.value }}
          publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Preflight: only attempt the Central publish when ALL FOUR required secrets are present.
      # Gating on the username alone would let a partial setup (e.g. username set but a signing
      # secret missing) run the upload with empty Gradle properties and fail the release AFTER
      # GitHub Packages was already published. `secrets` can't be read in a step-level `if:`, so
      # we map them to env here and expose a single `ready` flag.
      - name: Check Maven Central secrets
        id: central_secrets
        env:
          U: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          P: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          K: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          KP: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          if [ -n "$U" ] && [ -n "$P" ] && [ -n "$K" ] && [ -n "$KP" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Maven Central secrets incomplete — skipping Central publish. See docs/PUBLISHING.md."
          fi

      # Publish the signed artifacts to Maven Central (Sonatype Central Portal). Runs only when
      # all four secrets exist (see preflight) so the release never half-fails before the
      # maintainer has finished setup (docs/PUBLISHING.md). The secrets are mapped to the
      # ORG_GRADLE_PROJECT_* names the Vanniktech plugin reads. `publishAndReleaseToMavenCentral`
      # uploads, waits for Central's validation, and auto-releases on success (no manual Portal
      # click). Central validation gates the release: on failure nothing is published — the
      # GitHub Release + Packages steps above have already succeeded, so re-run after fixing.
      - name: Publish to Maven Central
        if: ${{ steps.central_secrets.outputs.ready == 'true' }}
        run: ./gradlew -PreleaseVersion=${{ steps.version.outputs.value }} publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}

      # build/libs holds the per-target artifacts staged for the GitHub Release page
      # (jvm jar, js/wasm klibs, metadata + sources jars). The native klibs themselves
      # are published to GitHub Packages by the step above. `shasum -a 256` is used
      # instead of `sha256sum` (the latter is absent on macOS runners).
      - name: Generate checksums
        run: |
          cd build/libs
          shasum -a 256 *.jar *.klib > SHA256SUMS.txt 2>/dev/null || shasum -a 256 *.jar > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            build/libs/*.jar
            build/libs/*.klib

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            build/libs/*.jar \
            build/libs/*.klib \
            build/libs/SHA256SUMS.txt
